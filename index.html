<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Snake Online</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body {
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
            background: radial-gradient(circle, #1a2a6c, #b21f1f, #fdbb2d);
            color: white; font-family: 'Montserrat', sans-serif; overflow: hidden;
        }
        .game-wrapper {
            position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.8);
            border-radius: 12px; overflow: hidden; background-color: #111;
            display: flex; flex-direction: column; align-items: center; width: 600px;
        }
        .hud {
            display: flex; justify-content: space-between; background: #0f0f0f;
            padding: 15px 30px; width: 100%; box-sizing: border-box; z-index: 5;
        }
        .player-score { display: flex; flex-direction: column; align-items: center; width: 45%; }
        .score-big { font-size: 28px; font-weight: 900; }
        
        canvas { display: block; background-color: #050505; cursor: none; }
        
        .log-panel {
            width: 100%; height: 40px; background: #0f0f0f; border-top: 2px solid #333;
            display: flex; justify-content: center; align-items: center; font-size: 14px; font-weight: bold;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.97); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }
        .hidden { display: none !important; }
        
        h1 { margin-bottom: 15px; font-size: 32px; text-transform: uppercase; background: linear-gradient(to right, #39ff14, #00ffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        input[type="text"] {
            padding: 12px; border-radius: 8px; border: none; width: 70%; margin-bottom: 15px;
            font-weight: bold; text-align: center; background: #222; color: white;
        }
        
        button {
            padding: 12px 30px; border-radius: 50px; border: none; font-weight: 900;
            cursor: pointer; text-transform: uppercase; margin: 5px; width: 80%;
        }
        .btn-create { background: linear-gradient(90deg, #39ff14, #00aa00); color: black; }
        .btn-join { background: #00ffff; color: black; font-size: 10px; width: auto; padding: 5px 10px; margin: 0;}
        .btn-back { background: transparent; border: 2px solid #555; color: #aaa; width: 50%; }

        .settings-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 90%; margin-bottom: 20px;
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px;
        }
        .s-item { display: flex; flex-direction: column; }
        .s-item label { font-size: 10px; color: #888; text-transform: uppercase; }
        select { background: #222; color: white; border: 1px solid #444; padding: 5px; border-radius: 4px; }

        #room-list {
            width: 90%; max-height: 200px; overflow-y: auto; background: rgba(0,0,0,0.5); 
            border-radius: 10px; padding: 10px; margin-bottom: 10px;
        }
        .room-item {
            background: #222; padding: 10px; margin-bottom: 5px; border-radius: 5px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid #444; font-size: 12px;
        }
        
        .design-box { display: flex; gap: 20px; margin-bottom: 20px; }
        .design-col { display: flex; flex-direction: column; align-items: center; }
        input[type="color"] { width: 40px; height: 40px; border: none; background: none; cursor: pointer; }

        #countdown-overlay {
            position: absolute; font-size: 150px; font-weight: 900; color: #fff; text-shadow: 0 0 30px #000;
            pointer-events: none; display: none; width: 100%; text-align: center; top: 50%; transform: translateY(-50%);
        }
        #win-msg { font-size: 30px; font-weight: 900; margin-bottom: 20px; }

        /* --- Language Switcher --- */
        #lang-switch {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 20px;
            cursor: pointer; border: 1px solid #555; color: white; font-size: 14px; z-index: 200;
        }
        #lang-switch:hover { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="lang-switch" onclick="toggleLanguage()">🇬🇧 EN</div>

    <div class="game-wrapper">
        <div class="hud">
            <div class="player-score">
                <span id="p1-name" style="font-size:12px; color:#aaa">P1</span>
                <span class="score-big" id="s1" style="color:#39ff14">0</span>
            </div>
            <div class="player-score">
                <span id="p2-name" style="font-size:12px; color:#aaa">P2</span>
                <span class="score-big" id="s2" style="color:#00ffff">0</span>
            </div>
        </div>

        <canvas id="gc" width="600" height="600"></canvas>
        <div id="countdown-overlay">5</div>

        <div class="log-panel">
            <div id="game-status" data-key="STATUS_WAITING">Waiting...</div>
        </div>

        <div id="menu-overlay" class="overlay">
            
            <div id="view-login" class="active" style="display:flex; flex-direction:column; align-items:center; width:100%">
                <h1 data-key="TITLE">NEON SNAKE</h1>
                <input type="text" id="inp-nick" placeholder="NICKNAME">
                
                <div class="design-box">
                    <div class="design-col">
                        <label data-key="BODY">Body</label>
                        <input type="color" id="inp-body" value="#39ff14">
                    </div>
                    <div class="design-col">
                        <label data-key="EYES">Eyes</label>
                        <input type="color" id="inp-eye" value="#000000">
                    </div>
                </div>

                <button class="btn-create" onclick="saveAndGoToLobby()" data-key="BTN_ENTER">ENTER</button>
            </div>

            <div id="view-lobby" class="hidden" style="display:flex; flex-direction:column; align-items:center; width:100%">
                <h2 data-key="LOBBY_TITLE">Lobby</h2>
                
                <div class="settings-grid">
                    <div class="s-item">
                        <label data-key="LBL_SPEED">Speed (FPS)</label>
                        <select id="set-fps">
                            <option value="7" data-key="OPT_SLOW">Slow (7)</option>
                            <option value="10" selected data-key="OPT_NORMAL">Normal (10)</option>
                            <option value="15" data-key="OPT_FAST">Fast (15)</option>
                            <option value="20" data-key="OPT_EXTREME">Extreme (20)</option>
                        </select>
                    </div>
                    <div class="s-item">
                        <label data-key="LBL_SIZE">Size</label>
                        <select id="set-size">
                            <option value="15" data-key="OPT_SMALL">Small</option>
                            <option value="25" selected data-key="OPT_MEDIUM">Medium</option>
                            <option value="40" data-key="OPT_LARGE">Large</option>
                        </select>
                    </div>
                    <div class="s-item">
                        <label data-key="LBL_GOAL">Goal</label>
                        <select id="set-goal">
                            <option value="10">10</option>
                            <option value="20" selected>20</option>
                            <option value="50">50</option>
                        </select>
                    </div>
                    <div class="s-item">
                        <label data-key="LBL_PENALTY">Penalty</label>
                        <select id="set-penalty">
                            <option value="2" data-key="OPT_HALF">Half (1/2)</option>
                            <option value="3" data-key="OPT_THIRD">Third (1/3)</option>
                            <option value="4" data-key="OPT_QUARTER">Quarter (1/4)</option>
                        </select>
                    </div>
                </div>

                <button class="btn-create" onclick="createRoom()" data-key="BTN_CREATE">CREATE GAME</button>
                
                <div style="width:90%; border-bottom:1px solid #333; margin:15px 0;"></div>
                <div style="font-size:12px; color:#777; margin-bottom:5px;" data-key="LBL_ROOMS">AVAILABLE ROOMS:</div>
                
                <div id="room-list">Looking for rooms...</div>
            </div>

            <div id="view-waiting" class="hidden" style="display:flex; flex-direction:column; align-items:center;">
                <h2 data-key="WAITING_TITLE">WAITING</h2>
                <div style="font-size:14px; color:#aaa; margin-bottom:20px;" data-key="WAITING_DESC">Share this room ID:</div>
                <div id="display-room-id" style="font-size:40px; color:#39ff14; font-weight:900; letter-spacing:3px; margin-bottom:30px;">...</div>
                <div id="waiting-text" style="color:yellow; animation: blink 1s infinite;" data-key="WAITING_STATUS">Waiting for opponent...</div>
            </div>

            <div id="view-gameover" class="hidden" style="display:flex; flex-direction:column; align-items:center;">
                <h2 style="color:red" data-key="GAMEOVER_TITLE">GAME OVER</h2>
                <div id="win-msg"></div>
                <button class="btn-create" onclick="location.reload()" data-key="BTN_MENU">MENU</button>
            </div>

        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // --- TRANSLATIONS CONFIGURATION ---
        const translations = {
            en: {
                TITLE: "NEON SNAKE",
                BODY: "Body",
                EYES: "Eyes",
                BTN_ENTER: "ENTER",
                LOBBY_TITLE: "Lobby",
                BTN_CREATE: "CREATE GAME",
                BTN_JOIN: "JOIN",
                LBL_SPEED: "Speed (FPS)",
                LBL_SIZE: "Size",
                LBL_GOAL: "Goal",
                LBL_PENALTY: "Penalty",
                LBL_ROOMS: "AVAILABLE ROOMS:",
                OPT_SLOW: "Slow (7)",
                OPT_NORMAL: "Normal (10)",
                OPT_FAST: "Fast (15)",
                OPT_EXTREME: "Extreme (20)",
                OPT_SMALL: "Small",
                OPT_MEDIUM: "Medium",
                OPT_LARGE: "Large",
                OPT_HALF: "Half (1/2)",
                OPT_THIRD: "Third (1/3)",
                OPT_QUARTER: "Quarter (1/4)",
                WAITING_TITLE: "WAITING",
                WAITING_DESC: "Share this room ID:",
                WAITING_STATUS: "Waiting for opponent...",
                PLAYER_JOINED: "Player joined! Getting ready...",
                CONNECTED: "Connected! Waiting for start...",
                GAMEOVER_TITLE: "GAME OVER",
                BTN_MENU: "MENU",
                STATUS_WAITING: "Waiting...",
                STATUS_PLAY: "PLAY!",
                WALL_HIT: "WALL HIT",
                SELF_BITE: "SELF BITE",
                ENEMY_COLLISION: "ACCIDENT",
                WINNER: "WINNER",
                DRAW: "DRAW",
                OPPONENT_LEFT: "Opponent left the game.",
                NO_ROOMS: "No rooms available. Create one!",
                NICK_PLACEHOLDER: "YOUR NICKNAME"
            },
            uk: {
                TITLE: "НЕОНОВА ЗМІЙКА",
                BODY: "Тіло",
                EYES: "Очі",
                BTN_ENTER: "УВІЙТИ",
                LOBBY_TITLE: "Лобі",
                BTN_CREATE: "СТВОРИТИ ГРУ",
                BTN_JOIN: "ГРАТИ",
                LBL_SPEED: "Швидкість (FPS)",
                LBL_SIZE: "Розмір",
                LBL_GOAL: "Ціль",
                LBL_PENALTY: "Штраф",
                LBL_ROOMS: "ДОСТУПНІ КІМНАТИ:",
                OPT_SLOW: "Повільно (7)",
                OPT_NORMAL: "Нормально (10)",
                OPT_FAST: "Швидко (15)",
                OPT_EXTREME: "Екстрім (20)",
                OPT_SMALL: "Мале",
                OPT_MEDIUM: "Середнє",
                OPT_LARGE: "Велике",
                OPT_HALF: "Половина (1/2)",
                OPT_THIRD: "Третина (1/3)",
                OPT_QUARTER: "Чверть (1/4)",
                WAITING_TITLE: "ОЧІКУВАННЯ",
                WAITING_DESC: "Код кімнати:",
                WAITING_STATUS: "Чекаємо на суперника...",
                PLAYER_JOINED: "Гравець приєднався! Готуємось...",
                CONNECTED: "Підключено! Чекаємо запуску...",
                GAMEOVER_TITLE: "ГРУ ЗАВЕРШЕНО",
                BTN_MENU: "В МЕНЮ",
                STATUS_WAITING: "Очікування...",
                STATUS_PLAY: "ГРАЙТЕ!",
                WALL_HIT: "ВРІЗАВСЯ В СТІНУ",
                SELF_BITE: "ВКУСИВ СЕБЕ",
                ENEMY_COLLISION: "АВАРІЯ",
                WINNER: "ПЕРЕМІГ",
                DRAW: "НІЧИЯ",
                OPPONENT_LEFT: "Суперник вийшов з гри.",
                NO_ROOMS: "Немає кімнат. Створи свою!",
                NICK_PLACEHOLDER: "ВАШ НІКНЕЙМ"
            }
        };

        let currentLang = 'en'; // Default

        // --- INIT & LOCALIZATION ---
        function initLanguage() {
            // 1. Check LocalStorage
            const savedLang = localStorage.getItem('snakeLang');
            if (savedLang) {
                currentLang = savedLang;
            } else {
                // 2. Check Browser Language
                const browserLang = navigator.language || navigator.userLanguage;
                if (browserLang.startsWith('uk') || browserLang.startsWith('ru')) {
                    currentLang = 'uk';
                } else {
                    currentLang = 'en';
                }
            }
            updateTexts();
        }

        function toggleLanguage() {
            currentLang = (currentLang === 'en') ? 'uk' : 'en';
            localStorage.setItem('snakeLang', currentLang);
            updateTexts();
        }

        function updateTexts() {
            // Update Toggle Button
            document.getElementById('lang-switch').innerText = (currentLang === 'en') ? "🇬🇧 EN" : "🇺🇦 UK";
            
            // Translate all elements with data-key attribute
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (translations[currentLang][key]) {
                    el.innerText = translations[currentLang][key];
                }
            });

            // Update placeholder
            document.getElementById('inp-nick').placeholder = translations[currentLang]['NICK_PLACEHOLDER'];
        }

        // Helper to get text by key
        function t(key) {
            return translations[currentLang][key] || key;
        }

        // --- GAME VARIABLES ---
        const socket = io();
        const canvas = document.getElementById("gc");
        const ctx = canvas.getContext("2d");
        
        let myData = { nick: "Player", design: { bodyColor: "#39ff14", eyeColor: "#000000" } };
        let currentRoomConfig = { gridSize: 25 }; 
        let viewStack = ['view-login'];

        window.onload = () => {
            initLanguage(); // Apply language settings

            const saved = localStorage.getItem('snakeUserData');
            if (saved) {
                const parsed = JSON.parse(saved);
                document.getElementById('inp-nick').value = parsed.nick || "";
                document.getElementById('inp-body').value = parsed.bodyColor || "#39ff14";
                document.getElementById('inp-eye').value = parsed.eyeColor || "#000000";
            }
        };

        function saveAndGoToLobby() {
            const nick = document.getElementById('inp-nick').value.trim() || "Player";
            const body = document.getElementById('inp-body').value;
            const eye = document.getElementById('inp-eye').value;

            myData = {
                nick: nick,
                design: { bodyColor: body, eyeColor: eye, shape: 'square' }
            };

            localStorage.setItem('snakeUserData', JSON.stringify({ nick, bodyColor: body, eyeColor: eye }));
            switchView('view-lobby');
        }

        function createRoom() {
            const settings = {
                fps: document.getElementById('set-fps').value,
                gridSize: document.getElementById('set-size').value,
                winScore: document.getElementById('set-goal').value,
                penalty: document.getElementById('set-penalty').value
            };
            socket.emit('createRoom', { userData: myData, settings: settings });
        }

        function joinRoom(id) {
            socket.emit('joinRoom', { roomId: id, userData: myData });
        }

        socket.on('roomsList', (list) => {
            const container = document.getElementById('room-list');
            container.innerHTML = "";
            if(list.length === 0) {
                container.innerHTML = `<div style='text-align:center; padding:20px; color:#555'>${t('NO_ROOMS')}</div>`;
                return;
            }
            list.forEach(r => {
                const div = document.createElement('div');
                div.className = 'room-item';
                div.innerHTML = `
                    <div>
                        <b style="color:#fff">${r.creator}</b> 
                        <span style="color:#777; margin-left:10px;">${r.config.gridSize}x${r.config.gridSize} | FPS:${r.config.fps}</span>
                    </div>
                    <button class="btn-join" onclick="joinRoom('${r.id}')">${t('BTN_JOIN')}</button>
                `;
                container.appendChild(div);
            });
        });

        socket.on('roomJoined', (data) => {
            currentRoomConfig = data.config;
            document.getElementById('display-room-id').innerText = data.roomId;
            switchView('view-waiting');
            if (data.role === 'p2') {
                document.getElementById('waiting-text').innerText = t('CONNECTED');
            }
        });

        socket.on('updateLobby', (data) => {
            if (data.players.length === 2) {
                document.getElementById('waiting-text').innerText = t('PLAYER_JOINED');
                document.getElementById('waiting-text').style.color = "#39ff14";
            }
        });

        socket.on('countdown', (num) => {
            document.getElementById('menu-overlay').classList.add('hidden');
            const ov = document.getElementById('countdown-overlay');
            ov.style.display = 'block';
            ov.innerText = num;
        });

        socket.on('gameStart', () => {
            document.getElementById('countdown-overlay').style.display = 'none';
            document.getElementById('game-status').innerText = t('STATUS_PLAY');
        });

        socket.on('gameState', (state) => {
            drawGame(state);
            updateHUD(state);
        });

        socket.on('collisionEvent', (data) => {
            const el = document.getElementById('game-status');
            // Translate the reason code sent by server
            const reasonText = t(data.reasonCode) || data.reasonCode;
            el.innerText = `${data.playerNick}: ${reasonText}!`;
            el.style.color = data.color;
            
            setTimeout(() => { 
                el.innerText = t('STATUS_PLAY'); 
                el.style.color = "white"; 
            }, 1500);
        });

        socket.on('gameOver', (data) => {
            document.getElementById('menu-overlay').classList.remove('hidden');
            switchView('view-gameover');
            const el = document.getElementById('win-msg');
            if (data.winner === 'DRAW') {
                el.innerText = t('DRAW') + "!";
                el.style.color = "white";
            } else {
                el.innerText = `${t('WINNER')} ${data.winner}!`;
                el.style.color = "#39ff14";
            }
        });

        socket.on('playerLeft', () => {
            alert(t('OPPONENT_LEFT'));
            location.reload();
        });

        socket.on('errorMsg', (msg) => {
            // Simplified error translation or raw alert
            alert(msg === "ROOM_NOT_FOUND" ? (currentLang === 'uk' ? "Кімната не знайдена" : "Room not found") : msg);
        });

        function drawGame(state) {
            const size = parseInt(currentRoomConfig.gridSize);
            const gs = 600 / size;

            ctx.fillStyle = "#050505";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "#111";
            ctx.lineWidth = 1;
            for(let i=0; i<size; i++) {
                ctx.beginPath(); ctx.moveTo(i*gs, 0); ctx.lineTo(i*gs, 600); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i*gs); ctx.lineTo(600, i*gs); ctx.stroke();
            }

            state.apples.forEach(a => drawApple(a.x, a.y, gs));

            drawSnake(state.p1, gs);
            drawSnake(state.p2, gs);
        }

        function drawSnake(p, gs) {
            // Fallback colors just in case
            const bodyColor = (p.design && p.design.bodyColor) ? p.design.bodyColor : "#fff";
            const eyeColor = (p.design && p.design.eyeColor) ? p.design.eyeColor : "#000";

            if (p.immunity > 0 && Math.floor(Date.now()/100)%2===0) {
                ctx.fillStyle = "#555"; 
                ctx.shadowBlur = 0;
            } else {
                ctx.fillStyle = bodyColor;
                ctx.shadowBlur = 10;
                ctx.shadowColor = bodyColor;
            }

            p.trail.forEach((t, i) => {
                ctx.fillRect(t.x * gs, t.y * gs, gs-1, gs-1);
                if (i === p.trail.length - 1) {
                    drawEyes(t.x, t.y, gs, eyeColor, p.facingX, p.facingY);
                }
            });
            ctx.shadowBlur = 0;
        }

        function drawEyes(x, y, gs, color, fx, fy) {
            ctx.fillStyle = color;
            const eyeSize = gs / 5;
            const off = gs / 3;
            const px = x * gs; const py = y * gs;
            let ex1, ey1, ex2, ey2;

            if (fx === 1) { ex1 = px+gs-off; ey1 = py+off; ex2 = px+gs-off; ey2 = py+gs-off; }
            else if (fx === -1) { ex1 = px+off; ey1 = py+off; ex2 = px+off; ey2 = py+gs-off; }
            else if (fy === -1) { ex1 = px+off; ey1 = py+off; ex2 = px+gs-off; ey2 = py+off; }
            else { ex1 = px+off; ey1 = py+gs-off; ex2 = px+gs-off; ey2 = py+gs-off; }

            ctx.beginPath(); ctx.arc(ex1, ey1, eyeSize, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(ex2, ey2, eyeSize, 0, Math.PI*2); ctx.fill();
        }

        function drawApple(x, y, gs) {
            ctx.fillStyle = "red"; ctx.shadowColor = "red"; ctx.shadowBlur = 15;
            const r = gs/2 - 2;
            const cx = x * gs + gs/2;
            const cy = y * gs + gs/2;
            ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
        }

        function updateHUD(state) {
            document.getElementById('p1-name').innerText = state.p1.nick;
            document.getElementById('s1').innerText = state.p1.score;
            if(state.p1.design) document.getElementById('s1').style.color = state.p1.design.bodyColor;

            document.getElementById('p2-name').innerText = state.p2.nick;
            document.getElementById('s2').innerText = state.p2.score;
            if(state.p2.design) document.getElementById('s2').style.color = state.p2.design.bodyColor;
        }

        function switchView(id) {
            document.querySelectorAll('.active').forEach(el => {
                if(el.id.startsWith('view-')) el.classList.remove('active');
                el.classList.add('hidden');
            });
            const target = document.getElementById(id);
            target.classList.remove('hidden');
            target.classList.add('active');
        }

        document.addEventListener("keydown", (evt) => {
            let xv=0, yv=0;
            switch(evt.keyCode) {
                case 37: xv=-1; break; case 38: yv=-1; break;
                case 39: xv=1; break; case 40: yv=1; break;
            }
            if(xv||yv) socket.emit('input', {xv, yv});
        });
    </script>
</body>
</html>
